<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: Void Navy -->
  <rect width="1024" height="1024" fill="#0D1B2A" rx="180"/>

  <!-- Grid of blocks (simplified 5x5 visible area, centered) -->
  <!-- Each block is ~100px with 12px gaps, offset to center -->
  <!-- Row 1 -->
  <rect x="232" y="182" width="100" height="100" rx="8" fill="#C6FF00"/>
  <rect x="344" y="182" width="100" height="100" rx="8" fill="#FF3C5F"/>
  <rect x="568" y="182" width="100" height="100" rx="8" fill="#6C5CE7"/>
  <rect x="680" y="182" width="100" height="100" rx="8" fill="#C6FF00"/>

  <!-- Row 2 -->
  <rect x="344" y="294" width="100" height="100" rx="8" fill="#00FFCC"/>
  <rect x="456" y="294" width="100" height="100" rx="8" fill="#FF6B35"/>
  <rect x="568" y="294" width="100" height="100" rx="8" fill="#C6FF00"/>
  <rect x="680" y="294" width="100" height="100" rx="8" fill="#FF3C5F"/>

  <!-- Row 3 — CLEARING ROW (all teal glow) -->
  <rect x="220" y="406" width="592" height="100" rx="4" fill="#00FFCC" opacity="0.15"/>
  <rect x="232" y="406" width="100" height="100" rx="8" fill="#00FFCC"/>
  <rect x="344" y="406" width="100" height="100" rx="8" fill="#00FFCC"/>
  <rect x="456" y="406" width="100" height="100" rx="8" fill="#00FFCC"/>
  <rect x="568" y="406" width="100" height="100" rx="8" fill="#00FFCC"/>
  <rect x="680" y="406" width="100" height="100" rx="8" fill="#00FFCC"/>

  <!-- Row 4 -->
  <rect x="232" y="518" width="100" height="100" rx="8" fill="#FF3C5F"/>
  <rect x="456" y="518" width="100" height="100" rx="8" fill="#6C5CE7"/>
  <rect x="568" y="518" width="100" height="100" rx="8" fill="#C6FF00"/>

  <!-- Row 5 -->
  <rect x="232" y="630" width="100" height="100" rx="8" fill="#FF6B35"/>
  <rect x="344" y="630" width="100" height="100" rx="8" fill="#C6FF00"/>
  <rect x="568" y="630" width="100" height="100" rx="8" fill="#00FFCC"/>
  <rect x="680" y="630" width="100" height="100" rx="8" fill="#FF3C5F"/>

  <!-- Glow effect around clearing row -->
  <rect x="216" y="400" width="600" height="112" rx="8" fill="none" stroke="#00FFCC" stroke-width="3" opacity="0.5"/>
  <rect x="210" y="394" width="612" height="124" rx="12" fill="none" stroke="#00FFCC" stroke-width="2" opacity="0.25"/>
</svg>
