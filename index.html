<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Line Crush! — Place pieces, clear lines, chase your high score. Free puzzle game by BAIT STUDIOS.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- OpenGraph / Social -->
  <meta property="og:title" content="Line Crush! | Free Puzzle Game">
  <meta property="og:description" content="Place pieces, clear lines, chain combos. Free browser puzzle game by BAIT STUDIOS.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://linecrush.bait.name">
  <meta name="twitter:card" content="summary">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Line Crush!">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Preload game fonts — helps WebViews that struggle with CanvasKit font loading -->
  <link rel="preload" href="assets/assets/fonts/Fredoka-Variable.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/assets/fonts/SpaceMono-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/assets/fonts/SpaceMono-Bold.ttf" as="font" type="font/ttf" crossorigin>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Line Crush! | Free Puzzle Game</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent browser scroll/bounce on the game area */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0D1B2A;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Register game fonts via CSS — helps WebViews discover fonts before CanvasKit requests them */
    @font-face {
      font-family: 'Fredoka';
      src: url('assets/assets/fonts/Fredoka-Variable.ttf') format('truetype');
      font-weight: 700;
      font-display: block;
    }
    @font-face {
      font-family: 'SpaceMono';
      src: url('assets/assets/fonts/SpaceMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: block;
    }
    @font-face {
      font-family: 'SpaceMono';
      src: url('assets/assets/fonts/SpaceMono-Bold.ttf') format('truetype');
      font-weight: 700;
      font-display: block;
    }

    /* Loading spinner while Flutter/CanvasKit initializes */
    .loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #0D1B2A;
    }
    .loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(103, 232, 249, 0.2);
      border-top-color: #67E8F9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Unsupported browser fallback message */
    .unsupported-msg {
      display: none;
      text-align: center;
      color: #67E8F9;
      font-family: 'SpaceMono', monospace;
      font-size: 14px;
      padding: 20px 40px;
      max-width: 360px;
    }
    .unsupported-msg h2 {
      color: #FBBF24;
      font-family: sans-serif;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .unsupported-msg a {
      color: #67E8F9;
      text-decoration: underline;
    }
    .unsupported-msg .copy-btn {
      margin-top: 16px;
      padding: 10px 24px;
      background: transparent;
      border: 2px solid #67E8F9;
      color: #67E8F9;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="unsupported-msg" id="unsupported">
      <h2>Line Crush!</h2>
      <p>Your browser doesn't fully support this game. For the best experience, open in <strong>Chrome</strong> or <strong>Safari</strong>.</p>
      <button class="copy-btn" onclick="navigator.clipboard.writeText('https://linecrush.bait.name').then(function(){this.textContent='Copied!'}.bind(this))">
        Copy link
      </button>
    </div>
  </div>

  <script>
    // Disable right-click context menu
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    // Check WebGL support — CanvasKit requires at least WebGL1
    (function() {
      var canvas = document.createElement('canvas');
      var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
      if (!gl) {
        // No WebGL at all — show fallback message, hide spinner
        var spinner = document.querySelector('.loading .spinner');
        var msg = document.getElementById('unsupported');
        if (spinner) spinner.style.display = 'none';
        if (msg) msg.style.display = 'block';
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
