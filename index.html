<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Line Crush! — Place pieces, clear lines, chase your high score. Free puzzle game by BAIT STUDIOS.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- OpenGraph / Social -->
  <meta property="og:title" content="Line Crush! | Free Puzzle Game">
  <meta property="og:description" content="Place pieces, clear lines, chain combos. Free browser puzzle game by BAIT STUDIOS.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://linecrush.bait.name">
  <meta name="twitter:card" content="summary">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Line Crush!">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Line Crush! | Free Puzzle Game</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent browser scroll/bounce on the game area */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0D1B2A;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Loading spinner while Flutter/CanvasKit initializes */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #0D1B2A;
    }
    .loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(103, 232, 249, 0.2);
      border-top-color: #67E8F9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <script>
    // Disable right-click context menu
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
